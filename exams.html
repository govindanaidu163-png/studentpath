<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentPath | Explore Exams</title>
  <meta name="description" content="Explore top entrance exams, trending tests, and career pathways on StudentPath.">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/explore.css">
  <link rel="stylesheet" href="css/transitions.css">
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbarContainer"></div>

  <!-- MAIN PAGE -->
  <main class="explore-main">

    <!-- ===== TRENDING EXAMS ===== -->
    <section class="trending-section">
      <div class="section-header">
        <h2>Trending Exams</h2>
        <button class="dots-btn" type="button">•••</button>
      </div>

      <div class="trending-viewport">
        <div id="trendingExams" class="trending-track"></div>
      </div>
    </section>

    <!-- ===== TOP EXAMS SECTION ===== -->
    <section class="top-careers-section">

      <!-- Row 1: Title + Pills + View All -->
      <div class="top-careers-header">
        <div class="top-careers-title-row">
          <h2>Top Exams</h2>
          <div class="pill-row">
            <button class="pill active" onclick="setPill(this, 'all')">All Exams</button>
            <button class="pill" onclick="setPill(this, 'hard')">High Difficulty</button>
            <button class="pill" onclick="setPill(this, 'easy')">Easy Entry</button>
            <button class="pill" onclick="setPill(this, 'popular')">Most Popular</button>
          </div>
        </div>
        <a href="#" class="view-all">View all &rsaquo;</a>
      </div>

      <!-- Row 2: Category icons -->
      <div class="category-icon-row">
        <button class="cat-icon active" onclick="filterExam('engineering', this)">
          <span class="cat-emoji">⚙️</span>
          <span>Engineering</span>
        </button>
        <button class="cat-icon" onclick="filterExam('medical', this)">
          <span class="cat-emoji">🩺</span>
          <span>Medical</span>
        </button>
        <button class="cat-icon" onclick="filterExam('government', this)">
          <span class="cat-emoji">🏛️</span>
          <span>Government</span>
        </button>
        <button class="cat-icon" onclick="filterExam('business', this)">
          <span class="cat-emoji">💼</span>
          <span>Business</span>
        </button>
        <button class="cat-icon" onclick="filterExam('law', this)">
          <span class="cat-emoji">⚖️</span>
          <span>Law</span>
        </button>
        <button class="cat-icon" onclick="filterExam('defense', this)">
          <span class="cat-emoji">🛡️</span>
          <span>Defense</span>
        </button>
        <button class="cat-icon" onclick="filterExam('science', this)">
          <span class="cat-emoji">🔬</span>
          <span>Science</span>
        </button>
      </div>

      <!-- Row 3: "Top Exams" label -->
      <h3 class="grid-label">Top Exams</h3>

      <!-- Exam grid -->
      <div id="examGrid" class="career-grid"></div>

    </section>

  </main>

  <!-- SCRIPTS -->
  <script src="js/data/examData.js"></script>
  <script type="module" src="js/core/loadNavbar.js"></script>
  <script src="js/features/explore-exams.js"></script>
  <!-- SPA Engine -->
  <script src="js/core/spa.js"></script>

</body>
</html>
