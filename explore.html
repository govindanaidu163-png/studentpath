<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Explore Careers</title>
  <link rel="stylesheet" href="../css/explore.css">
  <link rel="stylesheet" href="../css/navbar.css">
</head>

<body class="explore-page">

  <div id="navbarContainer"></div>

  <section class="category-bar">
  <div class="category-scroll">

    <button class="cat active" onclick="filterType('all')">All</button>
    <button class="cat" onclick="filterType('tech')">Technology</button>
    <button class="cat" onclick="filterType('health')">Healthcare</button>
    <button class="cat" onclick="filterType('business')">Business</button>
    <button class="cat" onclick="filterType('design')">Design</button>
    <button class="cat" onclick="filterType('finance')">Finance</button>
    <button class="cat" onclick="filterType('engineering')">Engineering</button>
    <button class="cat" onclick="filterType('creative')">Creative</button>

  </div>
</section>

  <main class="explore-page">

  <section class="trending-section">
    <div class="section-header">
      <h2>Trending Careers</h2>
      <button class="dots-btn" type="button">•••</button>
    </div>

    <div class="trending-viewport">
      <div id="trendingCareers" class="trending-track"></div>
    </div>
  </section>

  <section class="top-careers-section">
    <div class="section-header top-careers-header">
      <h2>Top Careers</h2>
      <a href="#" class="view-all">View all ›</a>
    </div>

    <div id="careerGrid" class="career-grid"></div>
  </section>

</main>

  <script src="../js/data/careersData.js"></script>
  <script src="../js/core/loadNavbar.js"></script>
  <script src="../js/features/explore.js"></script>
  

</body>
</html>
