<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Career Result</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/result.css">
</head>

<body class="result-page">

  <!-- BACKGROUND PARTICLES -->
  <canvas id="particles"></canvas>

  <div class="result-container">
    <div class="result-card">

      <p class="result-tag">✨ AI Career Match</p>

      <h1>Your Best Career Path</h1>

      <h2 id="careerTitle" class="gradient-text">Loading...</h2>

      <p id="careerDesc">
        Analyzing your strengths and interests...
      </p>

      <div class="result-actions">

        <button onclick="goDashboard()">
          Go to Back →
        </button>

        <button onclick="retakeQuiz()">
          Retake Quiz
        </button>

        <button class="main-btn" onclick="goSignup()">
          Know more about this career →
        </button>

      </div>

    </div>
  </div>

  <!-- JS -->
  <script src="../js/features/result.js"></script>

</body>
</html>
