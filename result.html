<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Career Result</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body class="result-page">

<!-- BACKGROUND PARTICLES -->
<canvas id="particles"></canvas>

<div class="result-container">

  <div class="result-card">

    <p class="result-tag">✨ AI Career Match</p>

    <h1>Your Best Career Path</h1>

    <h2 id="careerTitle" class="gradient-text">Loading...</h2>

    <p id="careerDesc">
      Analyzing your strengths and interests...
    </p>

    <div class="result-actions">
      <button class="main-btn" onclick="goDashboard()">
        Go to Dashboard →
      </button>

      <button class="secondary-btn" onclick="retakeQuiz()">
        Retake Quiz
      </button>

      <button class="main-btn" onclick="goSignup()">
       Know more about this career →
      </button>


    </div>

  </div>

</div>

<script>

// ================= GET RESULT =================
const result = localStorage.getItem("careerResult");

// ================= CAREER DATA =================
const careerData = {
  tech: {
    title: "🚀 Software Engineer",
    desc: "You enjoy logic, problem solving, and building digital systems. This path fits your analytical mindset and curiosity."
  },
  medical: {
    title: "🩺 Healthcare Professional",
    desc: "You care deeply about people and want to make a real-world impact through helping others."
  },
  creative: {
    title: "🎨 Creative Designer",
    desc: "You thrive in creativity, visual storytelling, and expressing ideas through design."
  },
  business: {
    title: "📈 Entrepreneur / Manager",
    desc: "You are driven by leadership, strategy, and making decisions that create impact."
  }
};

// ================= LOAD RESULT =================
if (result && careerData[result]) {
  document.getElementById("careerTitle").innerText = careerData[result].title;
  document.getElementById("careerDesc").innerText = careerData[result].desc;
} else {
  document.getElementById("careerTitle").innerText = "No Result Found";
  document.getElementById("careerDesc").innerText = "Please take the quiz first.";
}

// ================= ACTIONS =================
function goDashboard() {
  window.location.href = "dashboard.html";
}

function retakeQuiz() {
  window.location.href = "quiz.html";
}

// ================= PARTICLES =================
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speedX: (Math.random() - 0.5) * 0.5,
    speedY: (Math.random() - 0.5) * 0.5
  });
}

function goSignup() {
  localStorage.setItem("authView", "signup");
  window.location.href = "index.html";
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  particles.forEach(p => {
    p.x += p.speedX;
    p.y += p.speedY;

    ctx.fillStyle = "rgba(99,102,241,0.7)";
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });

  requestAnimationFrame(animateParticles);
}

animateParticles();

</script>

</body>
</html>
