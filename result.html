<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudentPath Result</title>

  <link rel="stylesheet" href="css/result.css">
</head>

<body class="result-page">

<div class="result-container">

  <div class="result-box">

    <!-- BACK BUTTON -->
    <button class="back-btn" onclick="goHome()">← Back</button>

    <h2>Your Career Match 🎯</h2>

    <h1 id="careerTitle">Loading...</h1>

    <p id="careerDesc"></p>

    <div class="extra-info">
      <p><strong>💰 Salary:</strong> <span id="salary"></span></p>
      <p><strong>🛤 Roadmap:</strong> <span id="roadmap"></span></p>
    </div>

    <!-- CTA SECTION -->
    <div class="cta-box">
      <p>Want full roadmap, courses & guidance?</p>
      <button class="cta-btn" onclick="goSignup()">
        🚀 Create Free Account
      </button>
    </div>

    <!-- RETAKE -->
    <button onclick="restartQuiz()" class="main-btn">
      🔁 Take Quiz Again
    </button>

  </div>

</div>

<script src="js/features/result.js"></script>

</body>
</html>
