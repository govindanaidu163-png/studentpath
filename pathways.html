<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pathways</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 30px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.03);
      background: rgba(56,189,248,0.2);
    }

    .card h2 {
      margin-bottom: 10px;
    }

    .card p {
      color: #94a3b8;
      font-size: 14px;
    }

    footer {
      margin-top: 40px;
      color: #94a3b8;
    }

    .top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

.btn {
  padding: 10px 16px;
  border: none;
  border-radius: 10px;
  background: #38bdf8;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
  </style>
</head>

<body>


<div class="top-bar">
  <button class="btn" onclick="goBack()">⬅ Back</button>
  <h2>Guided Path 🚀</h2>
  <button class="btn" onclick="toggleTheme()">🌙</button>
</div>

<div class="container">

  <h1>Choose Your Stream 🎯</h1>
  <p>Select your interest to explore the best career paths</p>

  <div class="grid">

    <div class="card" onclick="goPCM()">
      <h2>🔬 PCM</h2>
      <p>Engineering, AI, Tech, Robotics</p>
    </div>

    <div class="card" onclick="goPCB()">
      <h2>🧬 PCB</h2>
      <p>Doctor, Medical, Biotech</p>
    </div>

    <div class="card" onclick="goCommerce()">
      <h2>💼 Commerce</h2>
      <p>Business, Finance, CA, Marketing</p>
    </div>

    <div class="card" onclick="goArts()">
      <h2>🎨 Arts</h2>
      <p>Design, Law, Media, Creativity</p>
    </div>

  </div>

</div>

<footer>
  Built by Govinda | StudentPath © 2026
</footer>

<script>
function goPCM() {
  localStorage.setItem("guidedStream", "pcm");
  window.location.href = "guided.html";
}

function goPCB() {
  localStorage.setItem("guidedStream", "pcb");
  window.location.href = "guided.html";
}

function goCommerce() {
  localStorage.setItem("guidedStream", "commerce");
  window.location.href = "guided.html";
}

function goArts() {
  localStorage.setItem("guidedStream", "arts");
  window.location.href = "guided.html";
}

function goBack() {
  document.body.style.opacity = "0";
  setTimeout(() => {
    window.location.href = "dashboard.html";
  }, 300);
}
</script>

</body>
</html>
