<!DOCTYPE html>
<html>
<head>
  <title>PCB Quiz</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    button {
      padding: 10px;
      background: #22c55e;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>PCB Career Quiz 🧬</h1>

<div class="box">
  <p>Do you like biology?</p>
  <input type="checkbox" id="bio"> Yes
</div>

<div class="box">
  <p>Do you like helping people?</p>
  <input type="checkbox" id="medical"> Yes
</div>

<div class="box">
  <p>Do you like research?</p>
  <input type="checkbox" id="research"> Yes
</div>

<button onclick="submitQuiz()">See Result</button>

<script>
function submitQuiz() {
  let score = {
    doctor: 0,
    research: 0,
    pharma: 0
  };

  if (document.getElementById("bio").checked) {
    score.doctor += 2;
    score.research += 1;
  }

  if (document.getElementById("medical").checked) {
    score.doctor += 2;
  }

  if (document.getElementById("research").checked) {
    score.research += 2;
    score.pharma += 1;
  }

  localStorage.setItem("pcbScore", JSON.stringify(score));

  window.location.href = "pcb.html";
}
</script>

</body>
</html>
