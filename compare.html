<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compare Careers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
    }

    .highlight {
      border: 2px solid #38bdf8;
      box-shadow: 0 0 15px rgba(56,189,248,0.6);
    }

    .btn {
      display: block;
      margin: 30px auto;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: #38bdf8;
      cursor: pointer;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>⚖️ Career Comparison</h1>

  <div id="compareBox" class="compare-grid"></div>

  <button class="btn" onclick="goBack()">⬅ Back</button>

</div>

<script src="js/data/careersData.js"></script>
<script>

const careers = window.careers || [];
const keys = JSON.parse(localStorage.getItem("compareCareers")) || [];
const container = document.getElementById("compareBox");

if (keys.length === 0) {
  container.innerHTML = "<p>No careers selected for comparison.</p>";
}

// 🧠 SAFE SCORE FUNCTION
function calculateScore(c) {
  return (
    (c.salary || 0) * 2 +
    (c.growth || 0) * 10 +
    (c.successRate || 0) -
    (c.difficulty || 0) * 10
  );
}

// 🔥 FIND BEST
let bestScore = -Infinity;

keys.forEach(k => {
  const c = careers.find(x => x.key === k);
  if (c) {
    const score = calculateScore(c);
    if (score > bestScore) bestScore = score;
  }
});

// 🧱 BUILD UI
keys.forEach(key => {

  const data = careers.find(c => c.key === key);
  if (!data) return;

  let div = document.createElement("div");
  div.className = "card";

  const score = calculateScore(data);

  if (score === bestScore) {
    div.classList.add("highlight");
  }

  div.innerHTML = `
    <h2>${data.name}</h2>
    <p><b>Salary:</b> ${data.salaryLabel || "N/A"}</p>
    <p><b>Difficulty:</b> ${data.difficulty ?? "N/A"}</p>
    <p><b>Success Rate:</b> ${data.successRate ?? "N/A"}%</p>
    <p><b>Growth:</b> ${data.growth ?? "N/A"}</p>
    <p><b>Score:</b> ${score}</p>
  `;

  container.appendChild(div);

});

// 🔙 BACK
window.goBack = function() {
  window.location.href = "saved.html";
};

console.log("Compare Keys:", keys);

</script>

</body>
</html>
