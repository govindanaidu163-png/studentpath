<!DOCTYPE html>
<html>
<head>
  <title>PCM Quiz</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 30px;
    }

    .box {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 10px;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Answer a few questions</h1>

<div class="box">
  <p>1. Do you enjoy coding?</p>
  <input type="checkbox" id="coding">
</div>

<div class="box">
  <p>2. Do you like solving logical problems?</p>
  <input type="checkbox" id="logic">
</div>

<div class="box">
  <p>3. Do you enjoy working with machines?</p>
  <input type="checkbox" id="machines">
</div>

<div class="box">
  <p>4. Do you like designing/building structures?</p>
  <input type="checkbox" id="construction">
</div>

<div class="box">
  <p>5. Do you enjoy creativity or innovation?</p>
  <input type="checkbox" id="creative">
</div>

<button onclick="submitQuiz()">See Result</button>

<script type="module">

import { auth, db } from "./js/firebase.js";
import { setDoc, doc } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

window.submitQuiz = async function() {

  console.log("SUBMIT CLICKED");

 let score = {
  software: 0,
  mechanical: 0,
  civil: 0
};

// SOFTWARE
if (document.getElementById("coding").checked) score.software += 2;
if (document.getElementById("logic").checked) score.software += 2;
if (document.getElementById("creative").checked) score.software += 1;

// MECHANICAL
if (document.getElementById("machines").checked) score.mechanical += 2;
if (document.getElementById("logic").checked) score.mechanical += 1;

// CIVIL
if (document.getElementById("construction").checked) score.civil += 2;
if (document.getElementById("creative").checked) score.civil += 1;

  localStorage.setItem("score", JSON.stringify(score));

  onAuthStateChanged(auth, async (user) => {
    if (user) {

      let maxCareer = "None";

      if (score.software >= score.mechanical && score.software >= score.civil) {
        maxCareer = "Software Engineer";
      } else if (score.mechanical >= score.civil) {
        maxCareer = "Mechanical Engineer";
      } else {
        maxCareer = "Civil Engineer";
      }

      let bestMessage = "";

     if (maxCareer === "Software Engineer") {
  bestMessage = "Best for you because you enjoy logic, coding and creativity.";
} else if (maxCareer === "Mechanical Engineer") {
      bestMessage = "Best for you because you like machines and problem solving.";
     } else {
     bestMessage = "Best for you because you enjoy designing and building structures.";
   }

      let total = score.software + score.mechanical + score.civil;

      let confidence = "Low";

      if (total >= 5) {
       confidence = "High";
      } else if (total >= 3) {
      confidence = "Medium";
}


      let reasons = [];

if (document.getElementById("coding").checked) {
  reasons.push("You enjoy coding");
}

if (document.getElementById("logic").checked) {
  reasons.push("You like logical problem solving");
}

if (document.getElementById("creative").checked) {
  reasons.push("You are creative");
}

if (document.getElementById("machines").checked) {
  reasons.push("You like machines");
}

if (document.getElementById("construction").checked) {
  reasons.push("You like building structures");
}

      await setDoc(doc(db, "users", user.uid), {
  recommendedCareer: maxCareer,
  confidenceLevel: confidence,
  reasons: reasons,
  bestMessage: bestMessage
  });

      window.location.href = "pcm.html";
    }
  });

};

</script>

</body>
</html>
